name: CI/CD Pipeline - Laravel Deploy

on:
  push:
    branches:
      - main
      - master

env:
  IMAGE_NAME: laravel-app
  CONTAINER_NAME: laravel_app

jobs:
  # ─────────────────────────────────────────
  # JOB 1: BUILD DOCKER IMAGE
  # ─────────────────────────────────────────
  build:
    name: Build Laravel + Tailwind
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:latest .
          docker save ${{ env.IMAGE_NAME }}:latest | gzip > image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-docker-image
          path: image.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2: DEPLOY KE SERVER
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-docker-image

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload image ke server
        run: |
          scp -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            image.tar.gz \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/laravel-image.tar.gz

      - name: Deploy container di server
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

            echo "Loading Docker image..."
            docker load < /tmp/laravel-image.tar.gz

            echo "Stopping old container..."
            docker stop laravel_app 2>/dev/null || true
            docker rm laravel_app 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name laravel_app \
              --restart unless-stopped \
              --network devops-lab_devops_network \
              -p 8083:80 \
              -e APP_NAME="Laravel" \
              -e APP_ENV=production \
              -e APP_DEBUG=false \
              -e APP_URL=${{ secrets.APP_URL }} \
              -e APP_KEY=${{ secrets.APP_KEY }} \
              -e DB_CONNECTION=mysql \
              -e DB_HOST=mysql_db \
              -e DB_PORT=3306 \
              -e DB_DATABASE=${{ secrets.DB_DATABASE }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              laravel-app:latest

            echo "Cleaning up..."
            rm -f /tmp/laravel-image.tar.gz
            docker image prune -f

            echo "Deploy selesai!"
            docker ps | grep laravel_app

          EOF

      - name: Verifikasi deployment
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "docker ps --filter name=laravel_app --format '{{.Names}} | {{.Status}} | {{.Ports}}'"